<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试音乐Socket实时推送</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .status.connected { background: #d4edda; color: #155724; }
        .status.disconnected { background: #f8d7da; color: #721c24; }
        .status.loading { background: #fff3cd; color: #856404; }
        .music-data {
            background: #f8f9fa;
            padding: 15px;
            margin: 10px 0;
            border-radius: 4px;
            border-left: 4px solid #007bff;
        }
        .song-item {
            background: white;
            padding: 10px;
            margin: 5px 0;
            border-radius: 4px;
            border: 1px solid #dee2e6;
        }
        .playing {
            background: #e3f2fd;
            border-color: #2196f3;
        }
        pre {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 音乐Socket实时推送测试</h1>
        
        <div id="socketStatus" class="status disconnected">
            Socket状态: 未连接
        </div>
        
        <div id="musicData" class="music-data">
            <h3>当前音乐数据:</h3>
            <div id="currentSong">暂无数据</div>
            <div id="songList"></div>
        </div>
        
        <div>
            <h3>调试日志:</h3>
            <pre id="logs"></pre>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <script>
        const statusEl = document.getElementById('socketStatus');
        const currentSongEl = document.getElementById('currentSong');
        const songListEl = document.getElementById('songList');
        const logsEl = document.getElementById('logs');
        
        let logs = [];
        
        function addLog(message) {
            const timestamp = new Date().toLocaleTimeString();
            logs.push(`[${timestamp}] ${message}`);
            if (logs.length > 20) logs.shift();
            logsEl.textContent = logs.join('\n');
        }
        
        function updateMusicDisplay(data) {
            if (data.currentPlayingSong) {
                const song = data.currentPlayingSong;
                currentSongEl.innerHTML = `
                    <div class="song-item playing">
                        <strong>🎵 正在播放: ${song.detail?.name || '未知歌曲'}</strong><br>
                        艺术家: ${song.detail?.artistNames?.join(', ') || '未知艺术家'}<br>
                        专辑: ${song.detail?.albumName || '未知专辑'}<br>
                        播放状态: ${song.playing ? '✅ 播放中' : '⏸️ 已暂停'}
                    </div>
                `;
            } else {
                currentSongEl.innerHTML = '<div class="song-item">暂无正在播放的歌曲</div>';
            }
            
            if (data.data && data.data.length > 0) {
                songListEl.innerHTML = `
                    <h4>播放列表 (${data.data.length}首歌曲):</h4>
                    ${data.data.map(song => `
                        <div class="song-item ${song.playing ? 'playing' : ''}">
                            ${song.playing ? '🎵' : '🎶'} ${song.detail?.name || '未知歌曲'} - ${song.detail?.artistNames?.join(', ') || '未知艺术家'}
                            ${song.playing ? ' (播放中)' : ''}
                        </div>
                    `).join('')}
                `;
            }
        }
        
        // 连接Socket.IO
        addLog('开始连接Socket.IO服务器...');
        
        const socket = io('https://me.jiclub.site', {
            path: '/socket.io',
            autoConnect: true,
            timeout: 5000,
            reconnection: true,
            reconnectionAttempts: 3,
            reconnectionDelay: 2000,
            reconnectionDelayMax: 5000,
            transports: ["polling", "websocket"]
        });
        
        socket.on('connect', () => {
            statusEl.className = 'status connected';
            statusEl.textContent = `Socket状态: 已连接 (ID: ${socket.id})`;
            addLog(`✅ Socket连接成功，ID: ${socket.id}`);
            
            // 连接成功后获取初始数据
            fetchInitialData();
        });
        
        socket.on('cloudmusicUpdate', (musicLogs) => {
            addLog(`🎵 接收到音乐数据更新: ${musicLogs.length}条记录`);
            
            // 记录原始数据中的playing状态
            const playingInOriginal = musicLogs.filter(song => song.playing === true);
            addLog(`🎵 原始数据中播放状态: ${playingInOriginal.length}首歌曲正在播放`);
            
            // 模拟musicApi.js中的处理逻辑（修复后的版本）
            const processedData = musicLogs.map(song => ({
                ...song,
                // 保持原始playing状态
                playing: song.playing === true
            }));
            
            const currentPlayingSong = processedData.find(song => song.playing === true) || null;
            
            const result = {
                success: true,
                data: processedData,
                currentPlayingSong: currentPlayingSong,
                count: processedData.length,
                timestamp: new Date().toISOString()
            };
            
            updateMusicDisplay(result);
            addLog(`🎧 处理完成: 当前播放${currentPlayingSong?.detail?.name || '无'} (播放状态: ${currentPlayingSong?.playing || false})`);
        });
        
        socket.on('disconnect', (reason) => {
            statusEl.className = 'status disconnected';
            statusEl.textContent = `Socket状态: 已断开 (${reason})`;
            addLog(`❌ Socket连接断开: ${reason}`);
        });
        
        socket.on('connect_error', (error) => {
            statusEl.className = 'status disconnected';
            statusEl.textContent = `Socket状态: 连接错误`;
            addLog(`❌ Socket连接错误: ${error.message}`);
        });
        
        socket.on('reconnect', (attemptNumber) => {
            addLog(`🔄 Socket重连成功 (第${attemptNumber}次尝试)`);
        });
        
        // 获取初始数据
        async function fetchInitialData() {
            try {
                statusEl.className = 'status loading';
                statusEl.textContent = 'Socket状态: 获取初始数据中...';
                addLog('📥 正在获取初始音乐数据...');
                
                const response = await fetch('https://me.jiclub.site/api/cloudmusic', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    mode: 'cors',
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                addLog(`📥 获取到初始数据: ${data.data?.length || 0}条记录`);
                
                if (data.success) {
                    updateMusicDisplay(data);
                }
                
                statusEl.className = 'status connected';
                statusEl.textContent = `Socket状态: 已连接 (ID: ${socket.id})`;
            } catch (error) {
                addLog(`❌ 获取初始数据失败: ${error.message}`);
            }
        }
        
        addLog('🚀 页面加载完成，等待Socket连接...');
    </script>
</body>
</html>
